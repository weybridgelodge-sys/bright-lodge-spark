<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ladies Festival 2026 – Poster</title>
<style>
  @page {
    size: A4 portrait;
    margin: 0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 210mm; height: 297mm; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }
  img {
    width: 210mm;
    height: 297mm;
    object-fit: cover;
    display: block;
  }
  @media screen {
    body { background: #eee; padding: 20px; width: auto; height: auto; }
    img { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .hint {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: #1a2744; color: #d4a944; padding: 10px 24px;
      border-radius: 6px; font-family: sans-serif; font-size: 14px; z-index: 10;
    }
  }
  @media print { .hint { display: none; } }
</style>
</head>
<body>
  <div class="hint">Press <strong>Ctrl+P</strong> (or ⌘P) → Save as PDF</div>
  <img src="ladies-festival-poster.png" alt="Ladies Festival 2026 Poster">
</body>
</html>
